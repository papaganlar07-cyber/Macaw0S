UI menu.c32
PROMPT 0
MENU TITLE Macaw0S Boot Menu
TIMEOUT 50
DEFAULT macaw0s

LABEL macaw0s
  MENU LABEL Macaw0S Workstation
  LINUX /arch/boot/x86_64/vmlinuz-linux
  INITRD /arch/boot/x86_64/initramfs-linux.img
  APPEND archisobasedir=arch archisolabel=MACAW0S copytoram

LABEL macaw0s_safe
  MENU LABEL Macaw0S Workstation (Safe Graphics)
  LINUX /arch/boot/x86_64/vmlinuz-linux
  INITRD /arch/boot/x86_64/initramfs-linux.img
  APPEND archisobasedir=arch archisolabel=MACAW0S nomodeset
