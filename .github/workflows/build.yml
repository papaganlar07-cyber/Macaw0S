name: Macaw0S ISO Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso mkinitcpio

      - name: Build Macaw0S ISO
        run: |
          # Senin dosya yapındaki script'i çalıştırıyoruz
          chmod +x ./scripts/build-iso.sh
          ./scripts/build-iso.sh
        
      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Macaw0S-Alpha-ISO
          path: out/*.iso
          
